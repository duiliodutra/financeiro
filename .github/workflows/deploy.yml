name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_FIREBASE_API_KEY: AIzaSyCpoa6aWVB8Ci4lH8A2eATOK5kubdC9cqg
          VITE_FIREBASE_AUTH_DOMAIN: financeiro-pessoal-cd1c0.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: financeiro-pessoal-cd1c0
          VITE_FIREBASE_STORAGE_BUCKET: financeiro-pessoal-cd1c0.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '378029746975'
          VITE_FIREBASE_APP_ID: 1:378029746975:web:e2e8b823843ae17ac91e2a

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
