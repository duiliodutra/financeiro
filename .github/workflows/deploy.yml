name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/**'
      - '404.html'
      - '.nojekyll'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: node scripts/publish-root.mjs
        env:
          GITHUB_PAGES: 'true'
          VITE_FIREBASE_API_KEY: AIzaSyCpoa6aWVB8Ci4lH8A2eATOK5kubdC9cqg
          VITE_FIREBASE_AUTH_DOMAIN: financeiro-pessoal-cd1c0.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: financeiro-pessoal-cd1c0
          VITE_FIREBASE_STORAGE_BUCKET: financeiro-pessoal-cd1c0.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '378029746975'
          VITE_FIREBASE_APP_ID: 1:378029746975:web:e2e8b823843ae17ac91e2a

      - name: Publicar build na raiz
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html .nojekyll assets favicon.svg icons.svg docs
          git diff --staged --quiet || git commit -m "Deploy GitHub Pages [skip ci]"
          git push
